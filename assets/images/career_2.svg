<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <defs>
    <linearGradient id="c2bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8ecf6"/>
      <stop offset="100%" stop-color="#f5f7fb"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#c2bg)"/>

  <!-- デスク -->
  <rect x="30" y="135" width="260" height="8" fill="#8a6f4f"/>
  <rect x="40" y="143" width="8" height="40" fill="#8a6f4f"/>
  <rect x="272" y="143" width="8" height="40" fill="#8a6f4f"/>

  <!-- ラップトップ -->
  <g transform="translate(160 120)">
    <!-- キーボード -->
    <rect x="-50" y="10" width="100" height="6" rx="1" fill="#1a2d6b"/>
    <rect x="-55" y="16" width="110" height="4" rx="1" fill="#233e91"/>
    <!-- 画面 -->
    <rect x="-50" y="-40" width="100" height="55" rx="3" fill="#1a2d6b"/>
    <rect x="-46" y="-36" width="92" height="47" fill="#233e91"/>
    <!-- グラフ表示 -->
    <g stroke="#c8a84e" stroke-width="1.5" fill="none">
      <polyline points="-42,5 -30,0 -18,-8 -6,-12 6,-18 18,-20 30,-25 42,-30"/>
    </g>
    <!-- 棒グラフ -->
    <g fill="#ffffff" opacity="0.7">
      <rect x="-40" y="-5" width="4" height="14"/>
      <rect x="-30" y="-10" width="4" height="19"/>
      <rect x="-20" y="-14" width="4" height="23"/>
      <rect x="-10" y="-20" width="4" height="29"/>
    </g>
    <!-- スタートライン -->
    <line x1="-44" y1="9" x2="44" y2="9" stroke="#ffffff" stroke-width="0.5" opacity="0.4"/>
  </g>

  <!-- コーヒーカップ -->
  <g transform="translate(70 125)">
    <rect x="-10" y="-2" width="20" height="14" rx="1" fill="#ffffff" stroke="#233e91" stroke-width="1.5"/>
    <path d="M 10 3 Q 16 3 16 7 Q 16 11 10 11" fill="none" stroke="#233e91" stroke-width="1.5"/>
    <!-- 湯気 -->
    <g stroke="#a8c0e8" stroke-width="1.5" fill="none" opacity="0.7">
      <path d="M -4 -5 Q -2 -8 -4 -12"/>
      <path d="M 2 -5 Q 4 -8 2 -12"/>
    </g>
  </g>

  <!-- ノート -->
  <g transform="translate(250 130)">
    <rect x="-15" y="-5" width="30" height="6" fill="#c8a84e"/>
    <rect x="-15" y="1" width="30" height="2" fill="#a78936"/>
  </g>

  <!-- チェックマーク（タスク完了） -->
  <g transform="translate(70 60)">
    <circle cx="0" cy="0" r="18" fill="#233e91"/>
    <polyline points="-8,0 -2,6 8,-6" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- 年次バッジ -->
  <g transform="translate(30 175)">
    <rect x="0" y="-18" width="54" height="18" rx="9" fill="#c8a84e"/>
    <text x="27" y="-5" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="10" fill="#233e91">3年目</text>
  </g>
</svg>
