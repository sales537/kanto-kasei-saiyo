<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320">
  <defs>
    <linearGradient id="a4bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8ecf6"/>
      <stop offset="100%" stop-color="#f5f7fb"/>
    </linearGradient>
  </defs>
  <rect width="480" height="320" fill="url(#a4bg)"/>

  <text x="240" y="40" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="12" fill="#233e91" letter-spacing="3">TRAINING &amp; GROWTH</text>

  <!-- 本の山 -->
  <g transform="translate(240 185)">
    <!-- 一番下の本 -->
    <rect x="-90" y="10" width="180" height="24" rx="2" fill="#2d4ea6"/>
    <rect x="-88" y="14" width="176" height="2" fill="#ffffff" opacity="0.3"/>
    <rect x="-88" y="30" width="176" height="2" fill="#1a2d6b"/>

    <!-- 中段 -->
    <rect x="-70" y="-12" width="160" height="22" rx="2" fill="#233e91"/>
    <rect x="-68" y="-8" width="156" height="2" fill="#ffffff" opacity="0.3"/>

    <!-- 上段 -->
    <rect x="-55" y="-34" width="140" height="22" rx="2" fill="#4a6fc4"/>
    <rect x="-53" y="-30" width="136" height="2" fill="#ffffff" opacity="0.3"/>
  </g>

  <!-- 開いた本 -->
  <g transform="translate(240 120)">
    <polygon points="-60,-30 0,-40 0,10 -60,20" fill="#ffffff" stroke="#233e91" stroke-width="1.5"/>
    <polygon points="60,-30 0,-40 0,10 60,20" fill="#ffffff" stroke="#233e91" stroke-width="1.5"/>
    <!-- ページライン -->
    <g stroke="#233e91" stroke-width="1" opacity="0.3">
      <line x1="-50" y1="-20" x2="-10" y2="-28"/>
      <line x1="-50" y1="-12" x2="-10" y2="-20"/>
      <line x1="-50" y1="-4" x2="-10" y2="-12"/>
      <line x1="-50" y1="4" x2="-10" y2="-4"/>
      <line x1="10" y1="-28" x2="50" y2="-20"/>
      <line x1="10" y1="-20" x2="50" y2="-12"/>
      <line x1="10" y1="-12" x2="50" y2="-4"/>
      <line x1="10" y1="-4" x2="50" y2="4"/>
    </g>
  </g>

  <!-- 学士帽 -->
  <g transform="translate(380 95)">
    <!-- 帽子のベース -->
    <ellipse cx="0" cy="0" rx="32" ry="7" fill="#1a2d6b"/>
    <!-- 角帽部分 -->
    <polygon points="-30,-2 30,-2 32,0 -32,0" fill="#233e91"/>
    <polygon points="-30,-2 30,-2 22,-10 -22,-10" fill="#2d4ea6"/>
    <!-- タッセル -->
    <line x1="0" y1="-6" x2="18" y2="14" stroke="#c8a84e" stroke-width="2"/>
    <circle cx="18" cy="14" r="4" fill="#c8a84e"/>
  </g>

  <!-- 電球（アイデア/成長） -->
  <g transform="translate(100 100)">
    <path d="M 0 -20 Q -12 -20 -12 -8 Q -12 0 -4 5 L -4 10 L 4 10 L 4 5 Q 12 0 12 -8 Q 12 -20 0 -20 Z" fill="#c8a84e"/>
    <rect x="-5" y="10" width="10" height="3" fill="#a78936"/>
    <rect x="-4" y="14" width="8" height="2" fill="#a78936"/>
    <!-- 光線 -->
    <g stroke="#c8a84e" stroke-width="2" stroke-linecap="round" opacity="0.6">
      <line x1="-22" y1="-10" x2="-28" y2="-10"/>
      <line x1="22" y1="-10" x2="28" y2="-10"/>
      <line x1="-18" y1="-22" x2="-23" y2="-27"/>
      <line x1="18" y1="-22" x2="23" y2="-27"/>
      <line x1="0" y1="-28" x2="0" y2="-34"/>
    </g>
  </g>

  <!-- 上向き矢印（成長） -->
  <g transform="translate(420 190)" fill="#233e91" opacity="0.7">
    <path d="M 0 -20 L -8 -8 L -3 -8 L -3 10 L 3 10 L 3 -8 L 8 -8 Z"/>
  </g>

  <!-- キャプション -->
  <text x="240" y="270" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="18" fill="#233e91">充実の研修制度</text>
  <text x="240" y="290" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">産学協同の理念で一人ひとりを支援</text>
</svg>
