<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320">
  <defs>
    <linearGradient id="a2bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8ecf6"/>
      <stop offset="100%" stop-color="#f5f7fb"/>
    </linearGradient>
    <radialGradient id="chrome2" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#a8c0e8"/>
      <stop offset="100%" stop-color="#233e91"/>
    </radialGradient>
  </defs>
  <rect width="480" height="320" fill="url(#a2bg)"/>

  <text x="240" y="40" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="12" fill="#233e91" letter-spacing="3">WORLD-FIRST TECHNOLOGY</text>

  <!-- 中央の分子/原子構造 -->
  <g transform="translate(240 160)">
    <!-- 軌道 -->
    <ellipse cx="0" cy="0" rx="90" ry="30" fill="none" stroke="#233e91" stroke-width="1.5" opacity="0.6" transform="rotate(0)"/>
    <ellipse cx="0" cy="0" rx="90" ry="30" fill="none" stroke="#233e91" stroke-width="1.5" opacity="0.6" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="90" ry="30" fill="none" stroke="#233e91" stroke-width="1.5" opacity="0.6" transform="rotate(120)"/>

    <!-- クロム球体（中心） -->
    <circle cx="0" cy="0" r="36" fill="url(#chrome2)"/>
    <circle cx="-10" cy="-12" r="10" fill="#ffffff" opacity="0.5"/>

    <!-- 電子 -->
    <circle cx="90" cy="0" r="6" fill="#c8a84e"/>
    <circle cx="-90" cy="0" r="6" fill="#c8a84e"/>
    <circle cx="45" cy="26" r="6" fill="#c8a84e" transform="rotate(60 0 0)"/>
    <circle cx="-45" cy="-26" r="6" fill="#c8a84e" transform="rotate(60 0 0)"/>
    <circle cx="45" cy="-26" r="6" fill="#c8a84e" transform="rotate(120 0 0)"/>
    <circle cx="-45" cy="26" r="6" fill="#c8a84e" transform="rotate(120 0 0)"/>
  </g>

  <!-- "Cr" ラベル（3価クロム表現） -->
  <g transform="translate(240 160)">
    <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="18" fill="#ffffff">Cr</text>
  </g>

  <!-- バッジ：WORLD FIRST -->
  <g transform="translate(60 100)">
    <circle cx="0" cy="0" r="32" fill="#c8a84e"/>
    <circle cx="0" cy="0" r="32" fill="none" stroke="#a78936" stroke-width="2"/>
    <text x="0" y="-4" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="9" fill="#233e91">WORLD</text>
    <text x="0" y="10" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="9" fill="#233e91">FIRST</text>
  </g>

  <!-- 輝き -->
  <g fill="#ffffff">
    <circle cx="380" cy="80" r="2"/>
    <circle cx="420" cy="120" r="1.5"/>
    <circle cx="400" cy="200" r="2"/>
    <circle cx="80" cy="220" r="1.5"/>
  </g>

  <!-- キャプション -->
  <text x="240" y="275" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="18" fill="#233e91">世界初の技術力</text>
  <text x="240" y="295" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">プラめっき・3価クロムめっきを独自開発</text>
</svg>
