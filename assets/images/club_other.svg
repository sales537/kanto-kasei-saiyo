<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <defs>
    <linearGradient id="cobg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8ecf6"/>
      <stop offset="100%" stop-color="#f5f7fb"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#cobg)"/>

  <!-- 地面/ステージ -->
  <rect x="0" y="165" width="320" height="35" fill="#d8e0ee"/>

  <!-- トロフィー中央 -->
  <g transform="translate(160 100)">
    <!-- カップ -->
    <path d="M -28 -30 Q -28 20 0 30 Q 28 20 28 -30 Z" fill="#c8a84e"/>
    <path d="M -24 -26 Q -24 16 0 24 Q 24 16 24 -26 Z" fill="#e0c670" opacity="0.7"/>
    <!-- 取っ手 -->
    <path d="M -28 -22 Q -42 -22 -42 -8 Q -42 4 -28 4" fill="none" stroke="#c8a84e" stroke-width="4"/>
    <path d="M 28 -22 Q 42 -22 42 -8 Q 42 4 28 4" fill="none" stroke="#c8a84e" stroke-width="4"/>
    <!-- ステム -->
    <rect x="-6" y="28" width="12" height="18" fill="#c8a84e"/>
    <!-- 土台 -->
    <rect x="-22" y="46" width="44" height="10" rx="2" fill="#a78936"/>
    <rect x="-28" y="54" width="56" height="6" rx="1" fill="#8a6d28"/>
    <!-- 星 -->
    <path d="M 0 -20 L 3 -13 L 11 -12 L 5 -7 L 7 0 L 0 -4 L -7 0 L -5 -7 L -11 -12 L -3 -13 Z" fill="#ffffff" opacity="0.8"/>
  </g>

  <!-- 左：ゴルフクラブ＆ボール -->
  <g transform="translate(60 140)">
    <!-- クラブ -->
    <rect x="-2" y="-60" width="3" height="60" fill="#5a6577"/>
    <path d="M -2 0 L -10 6 L 1 6 Z" fill="#8a95a8"/>
    <!-- ボール -->
    <circle cx="-16" cy="8" r="5" fill="#ffffff" stroke="#233e91" stroke-width="1"/>
    <circle cx="-17" cy="7" r="0.8" fill="#cccccc"/>
    <circle cx="-14" cy="8" r="0.8" fill="#cccccc"/>
    <circle cx="-16" cy="10" r="0.8" fill="#cccccc"/>
  </g>

  <!-- 右：フットサル・ボール -->
  <g transform="translate(260 145)">
    <circle cx="0" cy="0" r="16" fill="#ffffff" stroke="#233e91" stroke-width="1.5"/>
    <polygon points="0,-10 8,-4 5,6 -5,6 -8,-4" fill="#233e91"/>
    <g fill="none" stroke="#233e91" stroke-width="1">
      <line x1="0" y1="-10" x2="0" y2="-16"/>
      <line x1="8" y1="-4" x2="14" y2="-7"/>
      <line x1="5" y1="6" x2="9" y2="13"/>
      <line x1="-5" y1="6" x2="-9" y2="13"/>
      <line x1="-8" y1="-4" x2="-14" y2="-7"/>
    </g>
  </g>

  <!-- 紙吹雪/キラキラ -->
  <g opacity="0.8">
    <rect x="40" y="30" width="5" height="5" fill="#c8a84e" transform="rotate(25 42 32)"/>
    <rect x="110" y="25" width="4" height="4" fill="#233e91" transform="rotate(-15 112 27)"/>
    <rect x="220" y="35" width="5" height="5" fill="#d13a3a" transform="rotate(45 222 37)"/>
    <rect x="280" y="28" width="4" height="4" fill="#2d4ea6" transform="rotate(-30 282 30)"/>
    <circle cx="80" cy="50" r="2" fill="#c8a84e"/>
    <circle cx="240" cy="60" r="2" fill="#c8a84e"/>
  </g>

  <!-- バッジ -->
  <g transform="translate(160 180)">
    <rect x="-56" y="-12" width="112" height="20" rx="10" fill="#233e91"/>
    <text x="0" y="2" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="11" fill="#ffffff">サークル・表彰</text>
  </g>
</svg>
