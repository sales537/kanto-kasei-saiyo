<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <defs>
    <linearGradient id="c3bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8ecf6"/>
      <stop offset="100%" stop-color="#f5f7fb"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#c3bg)"/>

  <!-- 会議テーブル -->
  <ellipse cx="160" cy="160" rx="120" ry="18" fill="#8a6f4f"/>
  <ellipse cx="160" cy="158" rx="120" ry="18" fill="#a88760"/>

  <!-- 中央の人（リーダー・少し大きめ） -->
  <g transform="translate(160 120)">
    <!-- 体 -->
    <rect x="-16" y="-10" width="32" height="32" rx="4" fill="#c8a84e"/>
    <!-- 頭 -->
    <circle cx="0" cy="-22" r="11" fill="#f1d5a0"/>
    <!-- 髪 -->
    <path d="M -10 -28 Q 0 -35 10 -28 L 10 -24 L -10 -24 Z" fill="#3a2d1f"/>
    <!-- ネクタイ -->
    <polygon points="0,-10 -3,-5 0,20 3,-5" fill="#233e91"/>
  </g>

  <!-- 左の人 -->
  <g transform="translate(100 130)">
    <rect x="-13" y="-8" width="26" height="26" rx="3" fill="#233e91"/>
    <circle cx="0" cy="-18" r="9" fill="#f1d5a0"/>
    <path d="M -8 -24 Q 0 -28 8 -24 L 8 -20 L -8 -20 Z" fill="#3a2d1f"/>
  </g>

  <!-- 右の人 -->
  <g transform="translate(220 130)">
    <rect x="-13" y="-8" width="26" height="26" rx="3" fill="#4a6fc4"/>
    <circle cx="0" cy="-18" r="9" fill="#f1d5a0"/>
    <path d="M -8 -24 Q 0 -28 8 -24 L 8 -20 L -8 -20 Z" fill="#3a2d1f"/>
  </g>

  <!-- 左端の人 -->
  <g transform="translate(55 138)">
    <rect x="-11" y="-6" width="22" height="22" rx="3" fill="#2d4ea6"/>
    <circle cx="0" cy="-14" r="7" fill="#f1d5a0"/>
  </g>

  <!-- 右端の人 -->
  <g transform="translate(265 138)">
    <rect x="-11" y="-6" width="22" height="22" rx="3" fill="#2d4ea6"/>
    <circle cx="0" cy="-14" r="7" fill="#f1d5a0"/>
  </g>

  <!-- 吹き出し（リーダーからのメッセージ） -->
  <g transform="translate(160 55)">
    <ellipse cx="0" cy="0" rx="60" ry="22" fill="#ffffff" stroke="#233e91" stroke-width="1.5"/>
    <path d="M -5 22 L 0 30 L 5 22 Z" fill="#ffffff" stroke="#233e91" stroke-width="1.5"/>
    <!-- 内部：グラフ -->
    <g stroke="#233e91" stroke-width="1.5" fill="none">
      <polyline points="-40,5 -25,-5 -10,-10 10,-15 25,-8 40,-12"/>
    </g>
    <g fill="#c8a84e">
      <circle cx="-25" cy="-5" r="2"/>
      <circle cx="25" cy="-8" r="2"/>
    </g>
    <text x="0" y="14" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="700" fill="#233e91">チーム目標</text>
  </g>

  <!-- 矢印（指揮） -->
  <g stroke="#c8a84e" stroke-width="2" fill="none" opacity="0.7">
    <path d="M 160 80 L 105 125" marker-end="url(#arrow)"/>
    <path d="M 160 80 L 215 125" marker-end="url(#arrow)"/>
  </g>

  <!-- 年次バッジ -->
  <g transform="translate(30 185)">
    <rect x="0" y="-18" width="54" height="18" rx="9" fill="#c8a84e"/>
    <text x="27" y="-5" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="10" fill="#233e91">5年目</text>
  </g>
</svg>
