<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320">
  <defs>
    <linearGradient id="a1bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8ecf6"/>
      <stop offset="100%" stop-color="#f5f7fb"/>
    </linearGradient>
  </defs>
  <rect width="480" height="320" fill="url(#a1bg)"/>

  <!-- タイトル表示 -->
  <text x="240" y="40" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="12" fill="#233e91" letter-spacing="3">INTEGRATED PRODUCTION</text>

  <!-- コンベアベルト -->
  <g>
    <rect x="40" y="200" width="400" height="20" rx="10" fill="#233e91"/>
    <rect x="40" y="200" width="400" height="20" rx="10" fill="none" stroke="#1a2d6b" stroke-width="1"/>
    <!-- ベルトの矢印パターン -->
    <g fill="#ffffff" opacity="0.4">
      <path d="M 60 206 l 8 4 -8 4 z"/>
      <path d="M 100 206 l 8 4 -8 4 z"/>
      <path d="M 140 206 l 8 4 -8 4 z"/>
      <path d="M 180 206 l 8 4 -8 4 z"/>
      <path d="M 220 206 l 8 4 -8 4 z"/>
      <path d="M 260 206 l 8 4 -8 4 z"/>
      <path d="M 300 206 l 8 4 -8 4 z"/>
      <path d="M 340 206 l 8 4 -8 4 z"/>
      <path d="M 380 206 l 8 4 -8 4 z"/>
    </g>
    <!-- ローラー -->
    <circle cx="50" cy="210" r="14" fill="#8a9fce" stroke="#4a6fc4" stroke-width="2"/>
    <circle cx="430" cy="210" r="14" fill="#8a9fce" stroke="#4a6fc4" stroke-width="2"/>
  </g>

  <!-- 工程ボックス（樹脂成形→めっき→塗装→組付） -->
  <g>
    <!-- Box 1: 樹脂成形 -->
    <rect x="60" y="130" width="70" height="50" rx="4" fill="#2d4ea6"/>
    <text x="95" y="152" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fff" font-weight="700">樹脂</text>
    <text x="95" y="166" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fff" font-weight="700">成形</text>

    <!-- Box 2: めっき -->
    <rect x="150" y="130" width="70" height="50" rx="4" fill="#233e91"/>
    <text x="185" y="152" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fff" font-weight="700">めっき</text>
    <text x="185" y="166" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fff" font-weight="700">加工</text>

    <!-- Box 3: 塗装 -->
    <rect x="240" y="130" width="70" height="50" rx="4" fill="#2d4ea6"/>
    <text x="275" y="152" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fff" font-weight="700">塗装</text>
    <text x="275" y="166" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fff" font-weight="700">蒸着</text>

    <!-- Box 4: 組付 -->
    <rect x="330" y="130" width="70" height="50" rx="4" fill="#233e91"/>
    <text x="365" y="152" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fff" font-weight="700">組付</text>
    <text x="365" y="166" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fff" font-weight="700">完成</text>

    <!-- 矢印 -->
    <g fill="#c8a84e">
      <path d="M 132 153 l 14 0 0 -4 6 6 -6 6 0 -4 -14 0 z"/>
      <path d="M 222 153 l 14 0 0 -4 6 6 -6 6 0 -4 -14 0 z"/>
      <path d="M 312 153 l 14 0 0 -4 6 6 -6 6 0 -4 -14 0 z"/>
    </g>
  </g>

  <!-- 歯車（装飾） -->
  <g fill="#c8a84e" opacity="0.85">
    <circle cx="80" cy="80" r="14"/>
    <path d="M 80 60 l 4 0 0 8 -4 0 z M 80 92 l 4 0 0 8 -4 0 z M 60 80 l 0 -4 8 0 0 4 z M 92 80 l 0 -4 8 0 0 4 z" fill="#c8a84e"/>
    <circle cx="80" cy="80" r="6" fill="#f5f7fb"/>

    <circle cx="400" cy="80" r="10"/>
    <circle cx="400" cy="80" r="4" fill="#f5f7fb"/>
  </g>

  <!-- キャプション -->
  <text x="240" y="270" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="18" fill="#233e91">一貫生産体制</text>
  <text x="240" y="290" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#64748b">樹脂成形から組付まで自社完結</text>
</svg>
