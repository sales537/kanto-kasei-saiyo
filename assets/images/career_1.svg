<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <defs>
    <linearGradient id="c1bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8ecf6"/>
      <stop offset="100%" stop-color="#f5f7fb"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#c1bg)"/>

  <!-- ホワイトボード -->
  <g>
    <rect x="30" y="20" width="180" height="100" fill="#ffffff" stroke="#233e91" stroke-width="2" rx="2"/>
    <!-- 図表：基礎 -->
    <g stroke="#233e91" stroke-width="1.5" fill="none">
      <circle cx="70" cy="55" r="10"/>
      <circle cx="110" cy="55" r="10"/>
      <circle cx="150" cy="55" r="10"/>
      <line x1="80" y1="55" x2="100" y2="55"/>
      <line x1="120" y1="55" x2="140" y2="55"/>
    </g>
    <!-- テキスト風ライン -->
    <g stroke="#233e91" stroke-width="1.5" opacity="0.4">
      <line x1="50" y1="85" x2="170" y2="85"/>
      <line x1="50" y1="98" x2="150" y2="98"/>
      <line x1="50" y1="108" x2="165" y2="108"/>
    </g>
    <!-- 会社名 -->
    <text x="40" y="35" font-family="sans-serif" font-size="9" font-weight="700" fill="#233e91">新人研修 2027</text>
  </g>

  <!-- 新芽（成長のシンボル） -->
  <g transform="translate(260 140)">
    <!-- 鉢 -->
    <path d="M -18 0 L 18 0 L 15 20 L -15 20 Z" fill="#8a6f4f"/>
    <rect x="-20" y="-3" width="40" height="4" fill="#6d4f3c"/>
    <!-- 土 -->
    <ellipse cx="0" cy="-2" rx="17" ry="2" fill="#4a3828"/>
    <!-- 茎 -->
    <path d="M 0 -2 Q -2 -20 0 -40" stroke="#8fb38e" stroke-width="3" fill="none"/>
    <!-- 葉 -->
    <ellipse cx="-10" cy="-25" rx="10" ry="5" fill="#8fb38e" transform="rotate(-30 -10 -25)"/>
    <ellipse cx="10" cy="-20" rx="10" ry="5" fill="#a5c4a3" transform="rotate(30 10 -20)"/>
    <ellipse cx="0" cy="-40" rx="8" ry="4" fill="#8fb38e"/>
  </g>

  <!-- 人のシルエット（新人） -->
  <g transform="translate(105 165)">
    <circle cx="0" cy="-30" r="10" fill="#233e91"/>
    <path d="M -15 0 L -15 -20 Q -15 -25 -10 -25 L 10 -25 Q 15 -25 15 -20 L 15 0 Z" fill="#233e91"/>
  </g>

  <!-- 年次バッジ -->
  <g transform="translate(30 175)">
    <rect x="0" y="-18" width="54" height="18" rx="9" fill="#c8a84e"/>
    <text x="27" y="-5" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="10" fill="#233e91">1年目</text>
  </g>
</svg>
